# Fork-only diagnostic (see vllm-project/vllm-metal#471): transformers 5.13.0
# proven as the Metal-breakage culprit by A/B on the same runner
# (5.13.0 -> CpuPlatform, 5.12.1 -> MetalPlatform). This verifies the fix:
# full CI pipeline on the pinned branch must go REAL green (Metal smokes +
# pytest, not a gate skip) — now on macos-26, the target CI pool. Delete after use.
name: Metal probe
on:
  push:
    branches: [probe/metal-runner-pools]
  workflow_dispatch:

jobs:
  pinned-full-pipeline:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - name: Checkout pinned branch
        uses: actions/checkout@v4
        with:
          ref: fix/ci-transformers-pin
          submodules: recursive
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-${{ runner.os }}-${{ hashFiles('scripts/test.sh') }}
      - name: Test (must run REAL Metal smokes, not the gate skip)
        run: |
          scripts/test.sh
